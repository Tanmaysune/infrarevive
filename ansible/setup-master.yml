---
- name: Configure Kubernetes Master Node
  hosts: k8s_master
  become: yes
  vars:
    k8s_version: "1.29"

  tasks:

    - name: Update system packages
      yum:
        name: '*'
        state: latest
        update_cache: yes

    - name: Disable swap permanently
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab

    - name: Load required kernel modules
      shell: |
        modprobe overlay
        modprobe br_netfilter

    - name: Set sysctl params for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
      notify: Apply sysctl

    - name: Install Docker
      shell: |
        yum install -y docker
        systemctl start docker
        systemctl enable docker
        usermod -aG docker ec2-user

    - name: Install Kubernetes repo
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/repodata/repomd.xml.key

    - name: Install kubeadm kubelet kubectl
      yum:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        disable_excludes: kubernetes

    - name: Enable and start kubelet
      service:
        name: kubelet
        state: started
        enabled: yes

    - name: Configure containerd
      shell: |
        yum install -y containerd
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        systemctl restart containerd
        systemctl enable containerd

    - name: Initialize Kubernetes master
      shell: kubeadm init --pod-network-cidr=10.244.0.0/16 --ignore-preflight-errors=all
      register: kubeadm_output
      args:
        creates: /etc/kubernetes/admin.conf

    - name: Set up kubeconfig for ec2-user
      shell: |
        mkdir -p /home/ec2-user/.kube
        cp /etc/kubernetes/admin.conf /home/ec2-user/.kube/config
        chown ec2-user:ec2-user /home/ec2-user/.kube/config

    - name: Install Flannel CNI
      become_user: ec2-user
      shell: kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      environment:
        KUBECONFIG: /home/ec2-user/.kube/config

    - name: Get kubeadm join command
      shell: kubeadm token create --print-join-command
      register: join_command_result

    - name: Save join command to file
      copy:
        content: "{{ join_command_result.stdout }}"
        dest: /tmp/kubeadm_join_command.sh
        mode: '0755'

    - name: Fetch join command to Debian VM
      fetch:
        src: /tmp/kubeadm_join_command.sh
        dest: /tmp/kubeadm_join_command.sh
        flat: yes

    - name: Install Node Exporter binary on master
      shell: |
        useradd --no-create-home --shell /bin/false node_exporter || true
        cd /tmp
        wget -q https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz
        tar xvf node_exporter-1.7.0.linux-amd64.tar.gz
        cp node_exporter-1.7.0.linux-amd64/node_exporter /usr/local/bin/
        chown node_exporter:node_exporter /usr/local/bin/node_exporter

    - name: Create node_exporter service on master
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Start node_exporter on master
      shell: |
        systemctl daemon-reload
        systemctl start node_exporter
        systemctl enable node_exporter

    - name: Ensure Docker running on master
      service:
        name: docker
        state: started
        enabled: yes

    - name: Ensure kubelet running on master
      service:
        name: kubelet
        state: started
        enabled: yes

    - name: Ensure node_exporter running on master
      service:
        name: node_exporter
        state: started
        enabled: yes

  handlers:
    - name: Apply sysctl
      shell: sysctl --system
