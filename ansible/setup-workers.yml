---
- name: Configure Kubernetes Worker Nodes
  hosts: k8s_workers
  become: yes
  vars:
    k8s_version: "1.29"
    join_command_file: /tmp/kubeadm_join_command.sh

  tasks:

    - name: Install iproute-tc
      yum:
        name: iproute-tc
        state: present

    - name: Disable swap permanently
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab

    - name: Load required kernel modules
      shell: |
        modprobe overlay
        modprobe br_netfilter
        echo 'overlay' > /etc/modules-load.d/k8s.conf
        echo 'br_netfilter' >> /etc/modules-load.d/k8s.conf

    - name: Set sysctl params for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl immediately
      shell: sysctl --system

    - name: Verify bridge-nf-call-iptables is set
      shell: cat /proc/sys/net/bridge/bridge-nf-call-iptables
      register: sysctl_check

    - name: Show sysctl value
      debug:
        msg: "bridge-nf-call-iptables = {{ sysctl_check.stdout }}"

    - name: Install Kubernetes repo
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/v1.29/rpm/repodata/repomd.xml.key

    - name: Install kubeadm kubelet kubectl
      yum:
        name:
          - kubeadm
          - kubelet
          - kubectl
        state: present
        disable_excludes: kubernetes

    - name: Configure containerd
      shell: |
        yum install -y containerd
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        systemctl restart containerd
        systemctl enable containerd

    - name: Enable kubelet after containerd is configured
      service:
        name: kubelet
        state: started
        enabled: yes

    - name: Copy fresh join command from the controller
      copy:
        src: "{{ join_command_file }}"
        dest: /tmp/kubeadm_join_command.sh
        mode: '0755'
      no_log: true

    - name: Join worker to Kubernetes cluster
      shell: bash /tmp/kubeadm_join_command.sh
      args:
        creates: /etc/kubernetes/kubelet.conf

    - name: Install Node Exporter binary on workers
      shell: |
        useradd --no-create-home --shell /bin/false node_exporter || true
        cd /tmp
        wget -q https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz
        tar xvf node_exporter-1.7.0.linux-amd64.tar.gz
        cp node_exporter-1.7.0.linux-amd64/node_exporter /usr/local/bin/
        chown node_exporter:node_exporter /usr/local/bin/node_exporter

    - name: Create node_exporter service on workers
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          ExecStart=/usr/local/bin/node_exporter

          [Install]
          WantedBy=multi-user.target

    - name: Start node_exporter on workers
      shell: |
        systemctl daemon-reload
        systemctl start node_exporter
        systemctl enable node_exporter

    - name: Ensure kubelet running on worker
      service:
        name: kubelet
        state: started
        enabled: yes

    - name: Ensure node_exporter running on worker
      service:
        name: node_exporter
        state: started
        enabled: yes
