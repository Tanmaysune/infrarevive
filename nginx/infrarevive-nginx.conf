user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    proxy_cache_path /var/cache/nginx/infrarevive levels=1:2 keys_zone=infrarevive_cache:10m inactive=15s;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;
        root         /usr/share/nginx/html;

        # ------------------------------------------------------------------
        # Dashboard static files
        # ------------------------------------------------------------------
        location /infrarevive/ {
            alias /usr/share/nginx/html/infrarevive/;
            index index.html;
            try_files $uri $uri/ /infrarevive/index.html;
        }

        # ------------------------------------------------------------------
        # Reverse proxies so the dashboard can call same-origin /api/*
        # instead of hitting Jenkins/Prometheus/Alertmanager cross-origin
        # (cross-origin calls to Alertmanager/Jenkins get blocked by CORS
        # in the browser, which is why the dashboard fell back to mock data)
        # ------------------------------------------------------------------
        location /api/jenkins/ {
            proxy_pass         http://127.0.0.1:8080/;
            proxy_connect_timeout 2s;
            proxy_read_timeout    4s;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_redirect      off;
        }

        location /api/prometheus/ {
            proxy_pass         http://127.0.0.1:9090/;
            proxy_connect_timeout 2s;
            proxy_read_timeout    4s;
            proxy_cache           infrarevive_cache;
            proxy_cache_valid     200 3s;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_redirect      off;
        }

        location /api/alertmanager/ {
            proxy_pass         http://127.0.0.1:9093/;
            proxy_connect_timeout 2s;
            proxy_read_timeout    4s;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_redirect      off;
        }
    }
}
