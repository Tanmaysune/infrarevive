version: '3.8'
services:
  flask-api:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: rootpassword
    depends_on:
      - mysql
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: results
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
