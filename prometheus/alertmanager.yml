route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 2h
  receiver: 'jenkins-webhook'
  routes:
    - match:
        severity: critical
      receiver: 'jenkins-webhook'
    - match:
        severity: warning
      receiver: 'jenkins-webhook'

receivers:
  - name: 'jenkins-webhook'
    webhook_configs:
      - url: 'http://localhost:8080/generic-webhook-trigger/invoke?token=INFRAREVIVE_RECOVERY_TOKEN'
        send_resolved: true
