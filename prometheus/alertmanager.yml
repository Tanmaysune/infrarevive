route:
  group_by: ['alertname']
  group_wait: 2s
  group_interval: 30s
  repeat_interval: 2h
  # Warnings go to dashboard-only sink; do not trigger full EC2 recovery.
  receiver: 'null'
  routes:
    - match:
        alertname: NodeDown
        severity: critical
      receiver: 'jenkins-webhook'
      continue: false

receivers:
  - name: 'null'

  - name: 'jenkins-webhook'
    webhook_configs:
      - url: 'http://localhost:8080/generic-webhook-trigger/invoke?token=INFRAREVIVE_RECOVERY_TOKEN'
        send_resolved: false
