global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'MASTER_IP:9100'
          - 'WORKER1_IP:9100'
          - 'WORKER2_IP:9100'
          - 'WORKER3_IP:9100'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'flask-api'
    metrics_path: '/health'
    static_configs:
      - targets: ['WORKER1_IP:30500']
