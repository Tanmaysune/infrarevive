global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - "alert.rules.yml"
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '100.58.174.225:9100'
          - '18.207.108.62:9100'
          - '100.54.125.61:9100'
          - '44.214.91.144:9100'
  - job_name: 'flask-api'
    metrics_path: '/health'
    static_configs:
      - targets: ['18.207.108.62:30500']
