global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - "alert.rules.yml"
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '44.223.87.167:9100'
          - '32.197.31.32:9100'
          - '3.231.60.185:9100'
          - '34.201.210.194:9100'
  - job_name: 'flask-api'
    metrics_path: '/health'
    static_configs:
      - targets: ['32.197.31.32:30500']
