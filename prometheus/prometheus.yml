global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '13.218.186.161:9100'
          - '98.91.186.88:9100'
          - '100.57.95.244:9100'
          - '98.92.198.74:9100'

  - job_name: 'flask-api'
    metrics_path: '/health'
    static_configs:
      - targets: ['98.91.186.88:30500']
